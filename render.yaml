# ==========================================================================
# AutoGPT Platform — Render Blueprint
# All resources share one Project + region (oregon) + workspace, as required
# for private networking. The executor Render WORKFLOW is NOT declared here
# (Blueprints can't); it's created manually — see README "Manual steps".
# ==========================================================================

previews:
  generation: off

projects:
  - name: autogpt-platform
    environments:
      - name: production

        databases:
          # Postgres 18 — app data (`platform` schema, owned by Prisma) +
          # GoTrue's `auth` schema. vector + pg_trgm created by migrations.
          - name: autogpt-platform-db
            databaseName: autogpt        # immutable after create
            user: autogpt                # immutable after create
            region: oregon               # immutable
            plan: basic-1gb              # ~97 conns; budget ≈ 47-52. Bump for load.
            postgresMajorVersion: "18"   # immutable
            ipAllowList: []              # internal (private network) only

        services:
          # Key Value (standalone Valkey) — locks, queues, pending-turn
          # buffers, rate-limit counters, shared cache.
          - type: keyvalue
            name: autogpt-platform-keyvalue
            region: oregon
            plan: starter                # PAID = disk-backed; do NOT use free
            ipAllowList: []              # internal-only
            maxmemoryPolicy: noeviction  # never drop locks/queue/pending keys

          # pg_cron replacement — refresh materialized views on a schedule.
          - type: cron
            name: autogpt-platform-mv-refresh
            runtime: image
            image:
              url: postgres:18-alpine    # ships psql; matches server major
            region: oregon
            plan: starter
            schedule: "*/15 * * * *"
            # RAW internal connection string (no ?schema= — libpq rejects it);
            # SET search_path so platform-schema functions resolve.
            dockerCommand: >-
              psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c
              "SET search_path TO platform;
               SELECT refresh_store_materialized_views();
               SELECT refresh_suggested_blocks_view();"
            envVars:
              - key: DATABASE_URL
                fromDatabase:
                  name: autogpt-platform-db
                  property: connectionString

          # ClamAV — private file-scanning service (raw TCP 3310, no HTTP, so
          # no healthCheckPath). Pinned image; definitions persisted on disk.
          - type: pserv
            name: clamav
            runtime: image
            region: oregon
            plan: pro                    # 4 GB RAM (clamd loads full DB to RAM)
            autoDeployTrigger: "off"     # pinned image; bump tag manually
            image:
              url: docker.io/clamav/clamav-debian:1.4.5
            disk:
              name: clamav-data
              mountPath: /var/lib/clamav
              sizeGB: 2
            envVars:
              - key: CLAMD_CONF_TCPAddr
                value: 0.0.0.0
              - key: CLAMAV_NO_FRESHCLAMD
                value: "false"
              - key: CLAMD_CONF_MaxThreads
                value: "6"
              - key: CLAMD_CONF_StreamMaxLength
                value: 50M
              - key: CLAMD_CONF_MaxFileSize
                value: 100M
              - key: CLAMD_CONF_MaxScanSize
                value: 100M
              - key: CLAMD_CONF_ReadTimeout
                value: "300"

          # GoTrue (Supabase Auth) — private; reached only via the frontend's
          # /auth/v1 rewrite. Owns the `auth` schema in autogpt-platform-db.
          - type: pserv
            name: autogpt-platform-gotrue
            runtime: image
            region: oregon
            plan: starter
            image:
              url: supabase/gotrue:v2.170.0
            envVars:
              - key: GOTRUE_API_HOST
                value: "0.0.0.0"
              - key: GOTRUE_API_PORT
                value: "10000"           # == Render default PORT (rewrite target)
              # FRONTEND_BASE_URL pulled from rest-server (the owner) — no re-prompt.
              - key: GOTRUE_API_EXTERNAL_URL
                fromService:
                  name: rest-server
                  type: web
                  envVarKey: FRONTEND_BASE_URL
              # Database — owns `auth` schema, so NO ?schema=platform wrapper.
              - key: GOTRUE_DB_DRIVER
                value: postgres
              - key: GOTRUE_DB_DATABASE_URL
                fromDatabase:
                  name: autogpt-platform-db
                  property: connectionString
              # JWT secret == backend JWT_VERIFY_KEY (rest-server's service-level
              # generateValue). A mismatch here breaks all auth.
              - key: GOTRUE_JWT_SECRET
                fromService:
                  name: rest-server
                  type: web
                  envVarKey: JWT_VERIFY_KEY
              - key: GOTRUE_JWT_ADMIN_ROLES
                value: service_role
              - key: GOTRUE_JWT_AUD
                value: authenticated
              - key: GOTRUE_JWT_DEFAULT_GROUP_NAME
                value: authenticated
              - key: GOTRUE_JWT_EXP
                value: "3600"
              - key: GOTRUE_SITE_URL
                fromService:
                  name: rest-server
                  type: web
                  envVarKey: FRONTEND_BASE_URL
              # Redirect allow-list stays deployer-supplied (carries callback
              # paths / wildcards, not a clean single origin).
              - key: GOTRUE_URI_ALLOW_LIST
                sync: false              # DEPLOYER: allowed redirect URLs (e.g. https://<frontend>/**)
              - key: GOTRUE_DISABLE_SIGNUP
                value: "false"
              - key: GOTRUE_EXTERNAL_EMAIL_ENABLED
                value: "true"
              - key: GOTRUE_EXTERNAL_ANONYMOUS_USERS_ENABLED
                value: "false"
              - key: GOTRUE_EXTERNAL_PHONE_ENABLED
                value: "false"
              - key: GOTRUE_MAILER_AUTOCONFIRM
                value: "false"          # set "true" only for a no-SMTP demo
              - key: GOTRUE_MAILER_URLPATHS_INVITE
                value: /auth/v1/verify
              - key: GOTRUE_MAILER_URLPATHS_CONFIRMATION
                value: /auth/v1/verify
              - key: GOTRUE_MAILER_URLPATHS_RECOVERY
                value: /auth/v1/verify
              - key: GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE
                value: /auth/v1/verify
              # SMTP — DEPLOYER-supplied (Render has no managed email).
              - key: GOTRUE_SMTP_HOST
                sync: false
              - key: GOTRUE_SMTP_PORT
                sync: false
              - key: GOTRUE_SMTP_USER
                sync: false
              - key: GOTRUE_SMTP_PASS
                sync: false
              - key: GOTRUE_SMTP_SENDER_NAME
                sync: false
              - key: GOTRUE_SMTP_ADMIN_EMAIL
                sync: false
              # Google OAuth — DEPLOYER-supplied (optional).
              - key: GOTRUE_EXTERNAL_GOOGLE_ENABLED
                sync: false
              - key: GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID
                sync: false
              - key: GOTRUE_EXTERNAL_GOOGLE_SECRET
                sync: false
              - key: GOTRUE_EXTERNAL_GOOGLE_REDIRECT_URI
                sync: false

          # rest-server — public API (FastAPI). SOLE owner of
          # `prisma migrate deploy` (preDeployCommand).
          - type: web
            name: rest-server
            runtime: docker
            region: oregon
            plan: standard
            rootDir: .
            dockerContext: .
            dockerfilePath: autogpt_platform/backend/Dockerfile
            # App reads AGENT_API_PORT (not $PORT). Wrap DB URLs with ?schema=
            # (Render can't interpolate env in YAML) and DERIVE:
            #   PLATFORM_BASE_URL       <- RENDER_EXTERNAL_URL (this service)
            #   BACKEND_CORS_ALLOW_ORIGINS <- [FRONTEND_BASE_URL]
            # ${VAR:-...} lets a Dashboard override win (custom domains).
            dockerCommand: >-
              /bin/sh -c 'export DATABASE_URL="$RENDER_DATABASE_URL?schema=platform";
              export DIRECT_URL="$RENDER_DIRECT_URL?schema=platform";
              export PLATFORM_BASE_URL="${PLATFORM_BASE_URL:-$RENDER_EXTERNAL_URL}";
              export BACKEND_CORS_ALLOW_ORIGINS="[\"$FRONTEND_BASE_URL\"]";
              exec env AGENT_API_PORT=$PORT /app/autogpt_platform/backend/.venv/bin/rest'
            healthCheckPath: /health
            # Prisma resolves both url=DATABASE_URL and directUrl=DIRECT_URL at
            # schema load, so both must be exported here too (else first deploy
            # fails with "Environment variable not found: DATABASE_URL").
            preDeployCommand: >-
              /bin/sh -c 'export DATABASE_URL="$RENDER_DATABASE_URL?schema=platform";
              export DIRECT_URL="$RENDER_DIRECT_URL?schema=platform";
              /app/autogpt_platform/backend/.venv/bin/prisma migrate deploy'
            envVars:
              # Postgres
              - key: RENDER_DATABASE_URL
                fromDatabase: { name: autogpt-platform-db, property: connectionString }
              - key: RENDER_DIRECT_URL
                fromDatabase: { name: autogpt-platform-db, property: connectionString }
              - key: DB_SCHEMA
                value: platform
              - key: DB_CONNECTION_LIMIT
                value: "10"
              # Redis / Key Value. The standalone client prefers REDIS_URL over
              # the split HOST/PORT/PASSWORD vars, so it stays correct whether or
              # not internal auth is enabled in the Dashboard. See README.
              - key: REDIS_HOST
                fromService: { name: autogpt-platform-keyvalue, type: keyvalue, property: host }
              - key: REDIS_PORT
                fromService: { name: autogpt-platform-keyvalue, type: keyvalue, property: port }
              - key: REDIS_URL
                fromService: { name: autogpt-platform-keyvalue, type: keyvalue, property: connectionString }
              - key: REDIS_CLUSTER_MODE
                value: "false"
              # Scheduler RPC client
              - key: SCHEDULER_HOST
                fromService: { name: scheduler-server, type: pserv, property: host }
              - key: EXECUTION_SCHEDULER_PORT
                fromService: { name: scheduler-server, type: pserv, property: port }
              # Workflows producer. EXECUTION_BACKEND selects the Workflows
              # path; RENDER_API_KEY + RENDER_WORKFLOW_SLUG are supplied by the
              # deployer-made env group (fromGroup below), created before apply.
              - key: EXECUTION_BACKEND
                value: workflows
              # ClamAV
              - key: CLAMAV_SERVICE_HOST
                fromService: { name: clamav, type: pserv, property: host }
              - key: CLAMAV_SERVICE_PORT
                fromService: { name: clamav, type: pserv, property: port }
              - key: CLAMAV_SERVICE_ENABLED
                value: "true"
              - key: CLAMAV_MARK_FAILED_SCANS_AS_CLEAN
                value: "false"
              - key: CLAMAV_MAX_CONCURRENCY
                value: "5"
              # Auth / JWT. rest-server OWNS the HS256 secret (service-level
              # generateValue); ws / scheduler / database-manager / GoTrue all
              # pull THIS value via `fromService envVarKey`. It is deliberately
              # NOT in the shared group — a group→service→service chain isn't
              # reliably resolvable, and a silent mismatch breaks auth.
              - key: JWT_VERIFY_KEY
                generateValue: true
              - key: JWT_SIGN_ALGORITHM
                value: HS256
              # ENCRYPTION_KEY (Fernet key for stored credentials) now comes
              # from the deployer-made env group (fromGroup below) — see README +
              # invariant #5. The manual Workflow, not a Blueprint resource, gets
              # the same key by hand; each service logs a fingerprint at boot.
              # URLs / CORS / env
              - key: APP_ENV
                value: prod
              # THE single backend URL keyname — rest-server OWNS it; gotrue /
              # ws / scheduler / database-manager pull it via `fromService
              # envVarKey: FRONTEND_BASE_URL`. A literal placeholder (NOT
              # sync:false) on purpose: the frontend's public URL is unknowable
              # at apply AND can't cross services (a sync:false source resolves
              # to "not found" and rolls the Blueprint back). Ship a valid https
              # placeholder (passes the CORS validator); the deployer sets the
              # REAL origin here ONCE after first deploy, then redeploys — the
              # fan-out carries it everywhere. See README.
              - key: FRONTEND_BASE_URL
                value: https://REPLACE-WITH-FRONTEND-URL.onrender.com
              # Blueprint-generated secrets group (UNSUBSCRIBE_SECRET_KEY)
              - fromGroup: autogpt-platform-secrets
              # Deployer-made group, created BEFORE apply: ENCRYPTION_KEY,
              # RENDER_API_KEY, RENDER_WORKFLOW_SLUG. See README.
              - fromGroup: autogpt-platform-deploy-secrets

          # websocket-server — public web service (WSS). Redis pub/sub fan-out.
          - type: web
            name: websocket-server
            runtime: docker
            region: oregon
            plan: standard
            rootDir: .
            dockerContext: .
            dockerfilePath: autogpt_platform/backend/Dockerfile
            # Derive CORS from FRONTEND_BASE_URL (pulled from rest-server below).
            dockerCommand: >-
              /bin/sh -c 'export DATABASE_URL="$RENDER_DATABASE_URL?schema=platform";
              export DIRECT_URL="$RENDER_DIRECT_URL?schema=platform";
              export BACKEND_CORS_ALLOW_ORIGINS="[\"$FRONTEND_BASE_URL\"]";
              exec env WEBSOCKET_SERVER_PORT=$PORT /app/autogpt_platform/backend/.venv/bin/ws'
            healthCheckPath: /health
            envVars:
              - key: RENDER_DATABASE_URL
                fromDatabase: { name: autogpt-platform-db, property: connectionString }
              - key: RENDER_DIRECT_URL
                fromDatabase: { name: autogpt-platform-db, property: connectionString }
              - key: DB_SCHEMA
                value: platform
              - key: DB_CONNECTION_LIMIT
                value: "10"
              - key: REDIS_HOST
                fromService: { name: autogpt-platform-keyvalue, type: keyvalue, property: host }
              - key: REDIS_PORT
                fromService: { name: autogpt-platform-keyvalue, type: keyvalue, property: port }
              # Prefer REDIS_URL over split vars — see rest-server note.
              - key: REDIS_URL
                fromService: { name: autogpt-platform-keyvalue, type: keyvalue, property: connectionString }
              - key: REDIS_CLUSTER_MODE
                value: "false"
              - key: ENABLE_AUTH
                value: "true"
              # HS256 secret — pull rest-server's generateValue (owner).
              - key: JWT_VERIFY_KEY
                fromService: { name: rest-server, type: web, envVarKey: JWT_VERIFY_KEY }
              - key: JWT_SIGN_ALGORITHM
                value: HS256
              - key: APP_ENV
                value: prod
              # dockerCommand derives BACKEND_CORS_ALLOW_ORIGINS from this.
              - key: FRONTEND_BASE_URL
                fromService: { name: rest-server, type: web, envVarKey: FRONTEND_BASE_URL }
              # No ENCRYPTION_KEY: the WSS fan-out never decrypts creds (inv #5).
              - fromGroup: autogpt-platform-secrets

          # scheduler-server — private. APScheduler + RPC. numInstances: 1 (no
          # leader election). Routes app DB access through database-manager;
          # uses DIRECT_URL for the APScheduler jobstore.
          - type: pserv
            name: scheduler-server
            runtime: docker
            region: oregon
            plan: standard
            numInstances: 1
            rootDir: .
            dockerContext: .
            dockerfilePath: autogpt_platform/backend/Dockerfile
            dockerCommand: >-
              /bin/sh -c 'export DATABASE_URL="$RENDER_DATABASE_URL?schema=platform";
              export DIRECT_URL="$RENDER_DIRECT_URL?schema=platform";
              exec env EXECUTION_SCHEDULER_PORT=$PORT /app/autogpt_platform/backend/.venv/bin/scheduler'
            # NOTE: pserv can't declare healthCheckPath in a Blueprint. Serves
            # /health_check on its RPC port; set it in the Dashboard if desired.
            envVars:
              - key: PYRO_HOST
                value: "0.0.0.0"
              - key: RENDER_DATABASE_URL
                fromDatabase: { name: autogpt-platform-db, property: connectionString }
              - key: RENDER_DIRECT_URL
                fromDatabase: { name: autogpt-platform-db, property: connectionString }
              - key: DB_SCHEMA
                value: platform
              - key: DB_CONNECTION_LIMIT
                value: "10"
              - key: DATABASEMANAGER_HOST
                fromService: { name: database-manager, type: pserv, property: host }
              - key: DATABASE_API_PORT
                fromService: { name: database-manager, type: pserv, property: port }
              - key: REDIS_HOST
                fromService: { name: autogpt-platform-keyvalue, type: keyvalue, property: host }
              - key: REDIS_PORT
                fromService: { name: autogpt-platform-keyvalue, type: keyvalue, property: port }
              # Prefer REDIS_URL over split vars — see rest-server note.
              - key: REDIS_URL
                fromService: { name: autogpt-platform-keyvalue, type: keyvalue, property: connectionString }
              - key: REDIS_CLUSTER_MODE
                value: "false"
              - key: EXECUTION_BACKEND
                value: workflows
              # RENDER_API_KEY + RENDER_WORKFLOW_SLUG come from the deployer-made
              # env group (fromGroup below).
              # HS256 secret — pull rest-server's generateValue (owner).
              - key: JWT_VERIFY_KEY
                fromService: { name: rest-server, type: web, envVarKey: JWT_VERIFY_KEY }
              - key: APP_ENV
                value: prod
              - key: FRONTEND_BASE_URL
                fromService: { name: rest-server, type: web, envVarKey: FRONTEND_BASE_URL }
              - fromGroup: autogpt-platform-secrets
              # Deployer-made group — needs RENDER_API_KEY + RENDER_WORKFLOW_SLUG
              # (also carries ENCRYPTION_KEY, unused here; combined-group tradeoff).
              - fromGroup: autogpt-platform-deploy-secrets

          # database-manager — private. Centralized Prisma pool over RPC
          # (dockerCommand `db`). Required by scheduler-server (decision #4).
          - type: pserv
            name: database-manager
            runtime: docker
            region: oregon
            plan: standard
            numInstances: 1
            rootDir: .
            dockerContext: .
            dockerfilePath: autogpt_platform/backend/Dockerfile
            dockerCommand: >-
              /bin/sh -c 'export DATABASE_URL="$RENDER_DATABASE_URL?schema=platform";
              export DIRECT_URL="$RENDER_DIRECT_URL?schema=platform";
              exec env DATABASE_API_PORT=$PORT /app/autogpt_platform/backend/.venv/bin/db'
            # NOTE: pserv can't declare healthCheckPath in a Blueprint.
            envVars:
              - key: PYRO_HOST
                value: "0.0.0.0"
              - key: RENDER_DATABASE_URL
                fromDatabase: { name: autogpt-platform-db, property: connectionString }
              - key: RENDER_DIRECT_URL
                fromDatabase: { name: autogpt-platform-db, property: connectionString }
              - key: DB_SCHEMA
                value: platform
              - key: DB_CONNECTION_LIMIT
                value: "10"
              - key: REDIS_HOST
                fromService: { name: autogpt-platform-keyvalue, type: keyvalue, property: host }
              - key: REDIS_PORT
                fromService: { name: autogpt-platform-keyvalue, type: keyvalue, property: port }
              # Prefer REDIS_URL over split vars — see rest-server note.
              - key: REDIS_URL
                fromService: { name: autogpt-platform-keyvalue, type: keyvalue, property: connectionString }
              - key: REDIS_CLUSTER_MODE
                value: "false"
              # HS256 secret — pull rest-server's generateValue (owner).
              - key: JWT_VERIFY_KEY
                fromService: { name: rest-server, type: web, envVarKey: JWT_VERIFY_KEY }
              - key: APP_ENV
                value: prod
              - key: FRONTEND_BASE_URL
                fromService: { name: rest-server, type: web, envVarKey: FRONTEND_BASE_URL }
              - fromGroup: autogpt-platform-secrets
              # Deployer-made group — needs ENCRYPTION_KEY (database-manager
              # decrypts creds; same key as rest-server + the manual Workflow).
              # Also carries RENDER_API_KEY + RENDER_WORKFLOW_SLUG, unused here.
              - fromGroup: autogpt-platform-deploy-secrets

          # frontend — Next.js public web service (Node). NEXT_PUBLIC_* are
          # inlined at BUILD time → must be PUBLIC URLs, set before first build.
          - type: web
            name: frontend
            runtime: node
            region: oregon
            plan: standard
            rootDir: autogpt_platform/frontend
            # NEXT_PUBLIC_SUPABASE_URL (same-origin /auth/v1 → GoTrue) and
            # NEXT_PUBLIC_FRONTEND_BASE_URL are DERIVED from build-time
            # RENDER_EXTERNAL_URL (this frontend's origin), so the deployer never
            # enters them. ${VAR:-...} keeps any Dashboard override. Exports must
            # run before `next build` (NEXT_PUBLIC_* are inlined at build).
            buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm generate:api && export NEXT_PUBLIC_SUPABASE_URL="${NEXT_PUBLIC_SUPABASE_URL:-$RENDER_EXTERNAL_URL}" && export NEXT_PUBLIC_FRONTEND_BASE_URL="${NEXT_PUBLIC_FRONTEND_BASE_URL:-$RENDER_EXTERNAL_URL}" && pnpm exec cross-env NODE_OPTIONS=--max-old-space-size=4096 next build
            startCommand: pnpm start
            healthCheckPath: /health
            envVars:
              - key: NODE_VERSION
                value: "24"
              - key: NODE_OPTIONS
                value: --max-old-space-size=4096
              - key: NEXT_PUBLIC_SOURCEMAPS
                value: "false"
              # Public backend URLs (inlined at build). Separate services, so
              # they can't be derived from this frontend's RENDER_EXTERNAL_URL.
              - key: NEXT_PUBLIC_AGPT_SERVER_URL
                sync: false             # DEPLOYER: https://<rest-server host>/api
              - key: NEXT_PUBLIC_AGPT_WS_SERVER_URL
                sync: false             # DEPLOYER: wss://<websocket-server host>/ws
              # Private backend URL for SSR (skips public round-trip). :10000
              # MUST equal rest-server's internal $PORT (Blueprints can't
              # concatenate scheme + hostport + "/api"). See README.
              - key: AGPT_SERVER_URL
                value: http://rest-server:10000/api
              # supabase-js hits this frontend's own origin (/auth/v1 rewrite →
              # GoTrue). The URL is derived in buildCommand; only the anon-key
              # CREDENTIAL is deployer-supplied here.
              - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
                sync: false             # DEPLOYER: anon JWT signed with JWT_VERIFY_KEY
              - key: GOTRUE_INTERNAL_URL
                fromService:
                  name: autogpt-platform-gotrue
                  type: pserv
                  property: hostport    # -> autogpt-platform-gotrue:10000

# ==========================================================================
# Two groups are referenced via `fromGroup` above:
#   autogpt-platform-secrets        — declared below; Blueprint-managed.
#   autogpt-platform-deploy-secrets — deployer-made, NOT declared here. Holds
#     ENCRYPTION_KEY / RENDER_API_KEY / RENDER_WORKFLOW_SLUG; created by hand
#     before apply so services boot with values present (README). Undeclared
#     because sync:false is ignored in declared groups; `render blueprints
#     validate` and apply both expect it to already exist in the workspace.
# JWT_VERIFY_KEY stays a rest-server generateValue (fanned out), not in a group.
# ==========================================================================
envVarGroups:
  - name: autogpt-platform-secrets
    envVars:
      - key: UNSUBSCRIBE_SECRET_KEY   # signs email unsubscribe links
        generateValue: true
